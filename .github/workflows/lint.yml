name: lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
      - name: Format check
        run: |
          find . -path './.git' -prune -o -type f \( -name '*.sh' -o -name 'iris' \) -print0 | xargs -0 shfmt -d -i 4 -ci -sr
      - name: Lint check
        run: |
          find . -path './.git' -prune -o -type f \( -name '*.sh' -o -name 'iris' \) -print0 | xargs -0 shellcheck
